<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM Explorer</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 25px; }
        .header { display: flex; align-items: center; gap: 10px; color: #38bdf8; margin-top: 0; margin-bottom: 5px; font-size: 1.5em; font-weight: bold;}
        .subtitle { font-size: 0.95em; color: #94a3b8; margin-bottom: 20px; }
        .btn { border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; margin-bottom: 8px; margin-right: 5px; font-size: 0.9em; }
        .btn-active { background: #38bdf8; color: #0f172a; box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.3); }
        .btn-inactive { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
        .btn-inactive:hover { background: #334155; }
        .context-box { background: #1e293b; padding: 15px; border-left: 4px solid #34d399; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.9em; color: #a7f3d0; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; text-align: left; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th { background: #334155; padding: 12px 15px; color: #e2e8f0; font-weight: 600; }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; color: #f1f5f9; }
        tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

    <div class="header">🛡️ Globalmed Live DDM Role Simulator</div>
    <div class="subtitle">Select an enterprise identity role to see how Azure SQL transforms data on-the-fly:</div>
    
    <div id="btn-group">
        <button class="btn btn-active" onclick="updateRole('admin')" id="btn-admin">Database Admin / CCO</button>
        <button class="btn btn-inactive" onclick="updateRole('nurse')" id="btn-nurse">Lead Nurse</button>
        <button class="btn btn-inactive" onclick="updateRole('billing')" id="btn-billing">Billing Specialist</button>
        <button class="btn btn-inactive" onclick="updateRole('helpdesk')" id="btn-helpdesk">HelpDesk Support</button>
        <button class="btn btn-inactive" onclick="updateRole('research')" id="btn-research">Medical Researcher</button>
    </div>

    <div class="context-box">
        <span style="color: #94a3b8;">-- Active Security Context:</span><br>
        <span id="sql-context">EXECUTE AS USER = 'ChiefComplianceOfficer'; -- (Implicit Admin/UNMASK)</span>
    </div>

    <div style="overflow-x: auto; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);">
        <table id="data-table">
            <thead>
                <tr><th>PatientID</th><th>First Name</th><th>Last Name</th><th>Email</th><th>SSN</th><th>Credit Card</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

<script>
const dataStates = {
    admin: { context: "EXECUTE AS USER = 'ChiefComplianceOfficer'; -- (Has Explicit UNMASK Permission)", rows: [["1", "John", "Doe", "johndoe@globalmed.com", "123-45-6789", "1111-2222-3333-4444"], ["2", "Jane", "Smith", "janesmith@globalmed.com", "987-65-4321", "5555-6666-7777-8888"]] },
    nurse: { context: "EXECUTE AS USER = 'LeadNurse'; -- (DDM Active: Names unmasked for ID Verification)", rows: [["1", "John", "Doe", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-4444"], ["2", "Jane", "Smith", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-8888"]] },
    billing: { context: "EXECUTE AS USER = 'BillingSpecialist'; -- (DDM Active: Focused on Financial Fields)", rows: [["1", "JXXXX", "DXXXX", "jXXX@XXXX.com", "XXXX", "1111-2222-3333-4444"], ["2", "JXXXX", "SXXXX", "jXXX@XXXX.com", "XXXX", "5555-6666-7777-8888"]] },
    helpdesk: { context: "EXECUTE AS USER = 'HelpDeskSupport'; -- (DDM Active: Maximum Masking Enforced)", rows: [["1", "JXXXX", "DXXXX", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-4444"], ["2", "JXXXX", "SXXXX", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-8888"]] },
    research: { context: "EXECUTE AS USER = 'MedicalResearcher'; -- (DDM Active: Fully Anonymized Dataset)", rows: [["1", "JXXXX", "DXXXX", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-XXXX"], ["2", "JXXXX", "SXXXX", "jXXX@XXXX.com", "XXXX", "XXXX-XXXX-XXXX-XXXX"]] }
};

function updateRole(role) {
    document.getElementById("sql-context").innerText = dataStates[role].context;
    document.getElementById("table-body").innerHTML = dataStates[role].rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
    ['admin', 'nurse', 'billing', 'helpdesk', 'research'].forEach(r => { document.getElementById(`btn-${r}`).className = (r === role) ? "btn btn-active" : "btn btn-inactive"; });
}
updateRole('admin');
</script>
</body>
</html>
